<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      ;(function () {
        var isLocalPreview = location.hostname === "localhost" || location.hostname === "127.0.0.1"
        var isSourcePreview = /\/publications_modern\/index\.html$/.test(location.pathname)

        if (isLocalPreview && isSourcePreview) {
          location.replace("./dist/index.html" + location.search + location.hash)
        }
      })()
    </script>
    <script>
      document.write(
        '<link rel="icon" type="image/png" href="' +
          (location.hostname === "localhost" || location.hostname === "127.0.0.1"
            ? "http://localhost:8000/logo.png"
            : "../logo.png") +
          '" />'
      )
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>publications_modern</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
